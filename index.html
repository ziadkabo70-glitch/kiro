<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light" data-accent="indigo">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro Print - Affiliate Marketing Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js">
    </script>
    <style>
        :root {
            --font-ar: 'Cairo', 'Segoe UI', 'Tajawal', Tahoma, sans-serif;
            --font-en: 'Inter', 'Segoe UI', Tahoma, sans-serif;
            --radius-xs: 6px;
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08), 0 4px 14px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 48px rgba(0, 0, 0, 0.12), 0 8px 20px rgba(0, 0, 0, 0.06);
        }
        [data-theme="light"] {
            --bg-primary: #f1f5f9;
            --bg-secondary: #f8fafc;
            --bg-surface: #ffffff;
            --bg-surface-hover: #f1f5f9;
            --bg-surface-alt: #f8fafc;
            --bg-elevated: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --border-light: #e2e8f0;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --bg-input: #ffffff;
            --sidebar-bg: #ffffff;
            --danger-bg: #fef2f2;
            --danger-text: #dc2626;
            --success-bg: #f0fdf4;
            --success-text: #16a34a;
            --warning-bg: #fffbeb;
            --warning-text: #d97706;
            --info-bg: #eff6ff;
            --info-text: #2563eb;
        }
        [data-theme="dark"] {
            --bg-primary: #0b1120;
            --bg-secondary: #111827;
            --bg-surface: #1a2235;
            --bg-surface-hover: #1f2937;
            --bg-surface-alt: #151d2e;
            --bg-elevated: #1e293b;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-light: #1e293b;
            --border: #263348;
            --border-strong: #334155;
            --bg-input: #1a2235;
            --sidebar-bg: #111827;
        }
        [data-accent="indigo"] {
            --accent: #6366f1;
            --accent-light: #eef2ff;
            --accent-dark: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.35);
        }
        [data-accent="emerald"] {
            --accent: #10b981;
            --accent-light: #ecfdf5;
            --accent-dark: #059669;
            --accent-glow: rgba(16, 185, 129, 0.35);
        }
        [data-accent="rose"] {
            --accent: #f43f5e;
            --accent-light: #fff1f2;
            --accent-dark: #e11d48;
            --accent-glow: rgba(244, 63, 94, 0.35);
        }
        [data-accent="amber"] {
            --accent: #f59e0b;
            --accent-light: #fffbeb;
            --accent-dark: #d97706;
            --accent-glow: rgba(245, 158, 11, 0.35);
        }
        [data-accent="violet"] {
            --accent: #8b5cf6;
            --accent-light: #f5f3ff;
            --accent-dark: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.35);
        }
        [data-accent="sky"] {
            --accent: #0ea5e9;
            --accent-light: #f0f9ff;
            --accent-dark: #0284c7;
            --accent-glow: rgba(14, 165, 233, 0.35);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            font-size: 15px;
        }
        body {
            font-family: var(--font-ar);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.7;
            transition: background var(--transition-slow), color var(--transition-slow);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        [dir="ltr"] body {
            font-family: var(--font-en);
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 20px;
        }
        ::selection {
            background: var(--accent);
            color: #fff;
        }
        .app-layout {
            display: flex;
            min-height: 100vh;
            position: relative;
        }
        .sidebar {
            width: 270px;
            min-width: 270px;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            transition: all var(--transition);
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.5s var(--bounce);
        }
        [dir="ltr"] .sidebar {
            right: auto;
            left: 0;
            border-left: none;
            border-right: 1px solid var(--border);
            animation: slideInLeft 0.5s var(--bounce);
        }
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideInLeft {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 var(--accent-glow);
            }
            50% {
                box-shadow: 0 0 0 14px transparent;
            }
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .animate-in {
            animation: fadeInUp 0.5s var(--bounce) both;
        }
        .animate-in-delay-1 {
            animation-delay: 0.05s;
        }
        .animate-in-delay-2 {
            animation-delay: 0.1s;
        }
        .animate-in-delay-3 {
            animation-delay: 0.15s;
        }
        .animate-in-delay-4 {
            animation-delay: 0.2s;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            flex-shrink: 0;
        }
        .sidebar-logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            cursor: pointer;
            text-decoration: none;
            transition: transform var(--transition);
        }
        .sidebar-logo:hover {
            transform: scale(1.05);
        }
        .sidebar-logo .logo-accent {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar-logo .logo-text {
            color: var(--text-primary);
        }
        .sidebar-subtitle {
            font-size: 0.68rem;
            color: var(--text-tertiary);
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 10px 10px;
        }
        .nav-section {
            margin-bottom: 10px;
        }
        .nav-section-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-tertiary);
            padding: 8px 14px 6px;
            font-weight: 700;
            margin-top: 4px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all var(--transition-fast);
            margin: 1px 0;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            opacity: 0;
            transition: opacity var(--transition-fast);
            border-radius: var(--radius-sm);
        }
        .nav-link:hover {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
            border-color: var(--border-light);
            transform: translateX(-4px);
        }
        [dir="ltr"] .nav-link:hover {
            transform: translateX(4px);
        }
        .nav-link.active {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 700;
            border-color: rgba(99, 102, 241, 0.2);
            animation: pulse 2s infinite;
        }
        .nav-link i {
            width: 22px;
            text-align: center;
            font-size: 1rem;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .sidebar-footer {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: var(--bg-surface-alt);
            transition: all var(--transition-fast);
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            flex-shrink: 0;
            box-shadow: 0 2px 8px var(--accent-glow);
            animation: float 3s ease-in-out infinite;
        }
        .user-info {
            flex: 1;
            min-width: 0;
        }
        .user-name {
            font-weight: 700;
            font-size: 0.82rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .user-role {
            font-size: 0.68rem;
            color: var(--text-tertiary);
        }
        .main-content {
            flex: 1;
            margin-right: 270px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: margin var(--transition);
        }
        [dir="ltr"] .main-content {
            margin-right: 0;
            margin-left: 270px;
        }
        .topbar {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow-xs);
            backdrop-filter: blur(10px);
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            animation: fadeInUp 0.4s var(--bounce);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            transition: all var(--transition-fast);
            white-space: nowrap;
            text-decoration: none;
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn:hover {
            background: var(--bg-surface-hover);
            border-color: var(--border-strong);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 2px 8px var(--accent-glow);
        }
        .btn-primary:hover {
            background: var(--accent-dark);
            border-color: var(--accent-dark);
            box-shadow: 0 6px 20px var(--accent-glow);
            color: #fff;
        }
        .btn-accent {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            border: none;
            box-shadow: 0 4px 16px var(--accent-glow);
            font-weight: 700;
            animation: pulse 3s infinite;
        }
        .btn-accent:hover {
            box-shadow: 0 8px 28px var(--accent-glow);
            transform: translateY(-3px);
            color: #fff;
            animation: none;
        }
        .btn-danger {
            background: var(--danger-bg);
            color: var(--danger-text);
            border-color: #fecaca;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.75rem;
            border-radius: var(--radius-xs);
            gap: 4px;
        }
        .btn-xs {
            padding: 4px 8px;
            font-size: 0.7rem;
            border-radius: var(--radius-xs);
            gap: 3px;
        }
        .btn-icon {
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            transition: all var(--transition-fast);
            position: relative;
            flex-shrink: 0;
        }
        .btn-icon:hover {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
            border-color: var(--border-strong);
            transform: rotate(15deg);
        }
        .badge-count {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 18px;
            height: 18px;
            border-radius: 10px;
            background: #ef4444;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            pointer-events: none;
            box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);
            animation: fadeInScale 0.3s var(--bounce);
        }
        [dir="ltr"] .badge-count {
            right: auto;
            left: -4px;
        }
        .hidden {
            display: none !important;
        }
        .content-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }
        .card {
            background: var(--bg-surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            overflow: hidden;
            animation: fadeInUp 0.5s var(--bounce) both;
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            background: var(--bg-surface-alt);
        }
        .card-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        .card-body {
            padding: 20px;
        }
        .card-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-surface-alt);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-surface);
            border-radius: var(--radius);
            padding: 18px 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s var(--bounce) both;
            cursor: default;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .stat-icon-wrap {
            width: 50px;
            height: 50px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            transition: transform var(--transition);
        }
        .stat-card:hover .stat-icon-wrap {
            transform: scale(1.15) rotate(-5deg);
        }
        [dir="ltr"] .stat-card:hover .stat-icon-wrap {
            transform: scale(1.15) rotate(5deg);
        }
        .stat-icon-wrap.blue {
            background: #eef2ff;
            color: #6366f1;
        }
        .stat-icon-wrap.green {
            background: #ecfdf5;
            color: #10b981;
        }
        .stat-icon-wrap.amber {
            background: #fffbeb;
            color: #f59e0b;
        }
        .stat-icon-wrap.rose {
            background: #fff1f2;
            color: #f43f5e;
        }
        [data-theme="dark"] .stat-icon-wrap.blue {
            background: #1e1b4b;
            color: #818cf8;
        }
        [data-theme="dark"] .stat-icon-wrap.green {
            background: #0a2e1a;
            color: #6ee7b7;
        }
        [data-theme="dark"] .stat-icon-wrap.amber {
            background: #3a2a0a;
            color: #fcd34d;
        }
        [data-theme="dark"] .stat-icon-wrap.rose {
            background: #3b1219;
            color: #fca5a5;
        }
        .stat-info .stat-value {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            line-height: 1.2;
        }
        .stat-info .stat-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        table th,
        table td {
            padding: 11px 14px;
            text-align: right;
            border-bottom: 1px solid var(--border-light);
        }
        [dir="ltr"] table th,
        [dir="ltr"] table td {
            text-align: left;
        }
        table th {
            background: var(--bg-surface-alt);
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        table tbody tr {
            transition: background var(--transition-fast);
        }
        table tbody tr:hover {
            background: var(--bg-surface-hover);
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .status-pill.pending {
            background: #fef3c7;
            color: #92400e;
        }
        .status-pill.shipped {
            background: #dbeafe;
            color: #1e40af;
        }
        .status-pill.received {
            background: #d1fae5;
            color: #065f46;
        }
        .status-pill.rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-pill.returned {
            background: #fce7f3;
            color: #9d174d;
        }
        .status-pill.cancelled {
            background: #e5e7eb;
            color: #374151;
        }
        [data-theme="dark"] .status-pill.pending {
            background: #3d2e00;
            color: #fcd34d;
        }
        [data-theme="dark"] .status-pill.shipped {
            background: #1e3050;
            color: #93c5fd;
        }
        [data-theme="dark"] .status-pill.received {
            background: #1a3a2a;
            color: #6ee7b7;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
        .form-input,
        .form-select,
        textarea {

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
            document.documentElement.setAttribute('data-accent', currentAccent);
            const accentMap = { indigo: '#6366f1', emerald: '#10b981', rose: '#f43f5e', amber: '#f59e0b',
                violet: '#8b5cf6', sky: '#0ea5e9' };
            const darkMap = { indigo: '#4f46e5', emerald: '#059669', rose: '#e11d48', amber: '#d97706',
                violet: '#7c3aed', sky: '#0284c7' };
            const glowMap = { indigo: 'rgba(99,102,241,0.35)', emerald: 'rgba(16,185,129,0.35)',
                rose: 'rgba(244,63,94,0.35)', amber: 'rgba(245,158,11,0.35)', violet: 'rgba(139,92,246,0.35)',
                sky: 'rgba(14,165,233,0.35)' };
            document.documentElement.style.setProperty('--accent', accentMap[currentAccent] || '#6366f1');
            document.documentElement.style.setProperty('--accent-dark', darkMap[currentAccent] || '#4f46e5');
            document.documentElement.style.setProperty('--accent-glow', glowMap[currentAccent] ||
                'rgba(99,102,241,0.35)');
        }

        function processFrozenCommissions() {
            const now = new Date();
            let changed = false;
            LD.orders.forEach(o => {
                if (o.commissionStatus === 'frozen' && o.frozenAt) {
                    const frozenDate = new Date(o.frozenAt);
                    const diffDays = (now - frozenDate) / (1000 * 60 * 60 * 24);
                    if (diffDays >= 2) {
                        const marketer = findUser(o.marketerId);
                        if (marketer) {
                            marketer.balance += o.commissionAmount;
                            o.commissionStatus = 'released';
                            LD.notifications.unshift({
                                id: lgid(),
                                userId: marketer.id,
                                message: '✅ تم فك تجميد عمولة الطلب #' + o.id.replace('id_', '') +
                                    ' وإضافتها لرصيدك (' + o.commissionAmount + ' ₺)',
                                type: 'commission',
                                read: false,
                                timestamp: new Date().toISOString()
                            });
                        }
                        changed = true;
                    }
                }
            });
            if (changed) lsave();
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value.trim();
            if (!email || !pass) return showToast(t('fillAll'), 'error');
            if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
                let admin = LD.users.find(u => u.email.toLowerCase() === ADMIN_EMAIL && u.role === 'admin');
                if (!admin) {
                    admin = { id: 'admin_001', name: 'Admin Zoz', phone: '01000000001', email: ADMIN_EMAIL,
                        password: ADMIN_PASS, role: 'admin', balance: 0, salesCount: 0, commissionRate: 15,
                        referralCode: 'ADMIN001', referredBy: null, permissions: ['all'], pageName: 'Main Admin',
                        createdAt: new Date().toISOString(), active: true, banned: false, banReason: '' };
                    LD.users.push(admin);
                    lsave();
                }
                currentUser = admin;
            } else {
                const user = LD.users.find(u => (u.email.toLowerCase() === email || u.phone === email) && u.password ===
                    pass);
                if (!user) return showToast(t('invalidLogin'), 'error');
                if (!user.active || user.banned) return showToast(user.banned ? '🚫 ' + (user.banReason || t('banned')) :
                    t('accountDisabled'), 'error');
                if (user.role === 'admin' && user.email.toLowerCase() !== ADMIN_EMAIL) return showToast(t('invalidLogin'),
                    'error');
                currentUser = user;
            }
            document.getElementById('sidebar').style.display = 'flex';
            LD.auditLog.unshift({ id: lgid(), userId: currentUser.id, action: 'Login', details: currentUser.name +
                    ' logged in', timestamp: new Date().toISOString() });
            lsave();
            renderApp();
            showToast('👋 ' + t('welcome') + ', ' + currentUser.name + '!', 'success');
        }

        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value.trim();
            const pageName = document.getElementById('regPageName').value.trim();
            const ref = document.getElementById('regRef').value.trim();
            if (!name || !phone || !email || !pass) return showToast(t('fillAll'), 'error');
            if (email === ADMIN_EMAIL) return showToast(t('accountExists'), 'error');
            if (LD.users.find(u => u.email.toLowerCase() === email || u.phone === phone)) return showToast(t(
                'accountExists'), 'error');
            let referredBy = null;
            if (ref) { const ru = LD.users.find(u => u.referralCode === ref && u.role === 'marketer'); if (ru)
                    referredBy = ru.id; }
            const newUser = { id: lgid(), name, phone, email, password: pass, role: 'marketer', balance: 0,
                salesCount: 0, commissionRate: LD.settings.defaultCommissionRate, referralCode: 'REF' + Date.now()
                    .toString(36).toUpperCase(), referredBy, permissions: [], pageName: pageName || name,
                createdAt: new Date().toISOString(), active: true, banned: false, banReason: '' };
            LD.users.push(newUser);
            LD.auditLog.unshift({ id: lgid(), userId: newUser.id, action: 'Register', details: name +
                    ' created account', timestamp: new Date().toISOString() });
            if (referredBy) { LD.notifications.unshift({ id: lgid(), userId: referredBy, message: '🎉 New marketer joined via your referral: ' +
                        name, type: 'referral', read: false, timestamp: new Date().toISOString() }); }
            lsave();
            currentUser = newUser;
            document.getElementById('sidebar').style.display = 'flex';
            renderApp();
            showToast('✅ ' + t('accountCreated') + ' ' + t('welcome') + ', ' + name + '!', 'success');
        }

        function saveProduct(pid) {
            const n = document.getElementById('pn').value.trim();
            const d = document.getElementById('pd').value.trim();
            const pr = parseFloat(document.getElementById('pp').value) || 0;
            const colorEntries = document.querySelectorAll('#colorsContainer .color-entry');
            const colors = [];
            colorEntries.forEach(entry => {
                const inputs = entry.querySelectorAll('input');
                const name = inputs[0].value.trim();
                const image = inputs[1].value.trim();
                const stock = parseInt(inputs[2].value) || 0;
                if (name) colors.push({ colorName: name, images: [image], stock });
            });
            if (!n || colors.length === 0) return showToast(t('fillAll'), 'error');
            if (pid) {
                const p = findProduct(pid);
                if (p) Object.assign(p, { name: n, description: d, basePrice: pr, colors });
            } else {
                LD.products.push({ id: lgid(), name: n, description: d, basePrice: pr, colors, active: true,
                    createdAt: new Date().toISOString() });
            }
            lsave();
            closeModal();
            navigateTo('products');
            showToast('✅ ' + t('savedSuccess'), 'success');
        }

        function updateProfit(basePrice) {
            const spInput = document.getElementById('sp');
            const qtyInput = document.getElementById('oq');
            const profitEl = document.getElementById('profitVal');
            if (spInput && qtyInput && profitEl) {
                const sp = parseFloat(spInput.value) || basePrice;
                const qty = parseInt(qtyInput.value) || 0;
                const profit = Math.max(0, (sp - basePrice) * qty);
                profitEl.textContent = profit.toLocaleString();
            }
        }

            const col = document.getElementById('oc')?.value?.split(' (')[0];
            const p = findProduct(pid);
            const el = document.getElementById('oimgs');
            if (!el || !p || !col) return;
            const c = p.colors.find(x => x.colorName === col);
            if (c) el.innerHTML = c.images.map(i =>
                `<img src="${i}" class="img-thumb" style="width:65px;height:65px;" onerror="this.src='https://picsum.photos/seed/err/65/65'">`
                ).join('');

        function submitOrder(pid, basePrice) {
            const col = document.getElementById('oc')?.value?.split(' (')[0],
                qty = parseInt(document.getElementById('oq').value) || 1,
                cn = document.getElementById('cn').value.trim(),
                cp1 = document.getElementById('cp1').value.trim(),
                cp2 = document.getElementById('cp2').value.trim(),
                cw = document.getElementById('cw').value.trim(),
                sellerPrice = parseFloat(document.getElementById('sp').value) || basePrice;
            if (!cn || !cp1) return showToast(t('customerInfoRequired'), 'error');
            const totalAmount = sellerPrice * qty;
            const commissionAmount = Math.max(0, (sellerPrice - basePrice) * qty);
            const ord = {

        function updateOS(oid, st) {
            if (!st) return;
            const o = LD.orders.find(x => x.id === oid);
            if (!o) return;
            const m = findUser(o.marketerId);
            const shippedAr = 'تم الشحن',
                shippedEn = 'Shipped';
            const receivedAr = 'تم الاستلام',
                receivedEn = 'Received';
            const rejectedAr = 'رفض دفع',
                rejectedEn = 'Rejected';
            const returnedAr = 'مرتجع',
                returnedEn = 'Returned';
            const cancelledAr = 'إلغاء',
                cancelledEn = 'Cancelled';
            if (st === shippedAr || st === shippedEn) {
                o.status = st;
                if (o.commissionStatus === 'pending') o.commissionStatus = 'expected';
            } else if (st === receivedAr || st === receivedEn) {
                o.status = st;
                if (o.commissionStatus === 'expected' && o.commissionAmount > 0) {
                    o.commissionStatus = 'frozen';
                    o.frozenAt = new Date().toISOString();
                    LD.notifications.unshift({ id: lgid(), userId: m.id, message: '⏳ عمولة الطلب #' + oid.replace(
                            'id_', '') + ' (' + o.commissionAmount + ' ₺) تم تجميدها لمدة يومين',
                        type: 'commission', read: false, timestamp: new Date().toISOString() });
                }
            } else if (st === returnedAr || st === returnedEn) {
                o.status = st;
                if (o.commissionStatus === 'released') {
                    if (confirm(t('deductCommissionQ'))) { m.balance = Math.max(0, m.balance - o.commissionAmount);
                        o.commissionStatus = 'deducted'; }
                }
            } else if (st === cancelledAr || st === cancelledEn) {
                o.status = st;
                if (o.commissionStatus === 'pending' || o.commissionStatus === 'expected') o.commissionStatus =
                'cancelled';
            } else {
                o.status = st;
            }
            lsave();
            navigateTo('orders');
            showToast('✅ ' + t('updatedMsg'), 'success');
            updateNotifBadge();
        }

            <div class="card animate-in"><div class="card-header"><h3>🏷️ ${t('offers')}</h3><button class="btn btn-accent btn-sm" onclick="openOfferModal()"><i class="fas fa-plus"></i> ${t('add')}</button></div>
            <div class="card-body"><div class="table-wrap"><table><tr><th>${t('product')}</th><th>%</th><th>${t('date')}</th><th>${t('publicOffer')}</th><th></th></tr>
            ${LD.offers.map(o=>`<tr><td>${findProduct(o.productId)?.name||o.productId}</td><td>${o.discountPercent}%</td><td>${o.startDate} → ${o.endDate}</td><td>${o.public?t('publicOffer'):t('notPublic')}</td><td><button class="btn btn-xs btn-danger" onclick="deleteOffer('${o.id}')">🗑️</button></td></tr>`).join('')}</table></div></div></div>`;
        }

        function openOfferModal() {
            document.getElementById('modalContainer').innerHTML = `
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>🏷️ ${t('addOffer')}</h3><button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
            <div class="modal-body"><div class="form-group"><label class="form-label">${t('product')}</label><select class="form-select" id="op">${LD.products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
            <div class="form-group"><label class="form-label">%</label><input class="form-input" type="number" id="opct" value="10"></div>
            <div class="form-group"><label class="form-label">${t('startDate')}</label><input class="form-input" type="date" id="osd"></div>
            <div class="form-group"><label class="form-label">${t('endDate')}</label><input class="form-input" type="date" id="oed"></div>
            <div class="form-group"><label><input type="checkbox" id="opub" checked> ${t('publicOffer')}</label></div></div>
            <div class="modal-footer"><button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-accent" onclick="saveOffer()">${t('save')}</button></div></div></div>`;
            document.getElementById('osd').value = new Date().toISOString().split('T')[0];
            document.getElementById('oed').value = new Date(Date.now() + 365 * 86400000).toISOString().split('T')[0];
        }

        function saveOffer() {
            LD.offers.push({ id: lgid(), productId: document.getElementById('op').value,
                discountPercent: parseFloat(document.getElementById('opct').value) || 0,
                startDate: document.getElementById('osd').value, endDate: document.getElementById('oed').value,
                public: document.getElementById('opub').checked, active: true,
                createdAt: new Date().toISOString() });
            lsave();
            closeModal();
            navigateTo('offers');
            showToast('✅ ' + t('savedSuccess'), 'success');
        }

        function deleteOffer(oid) { LD.offers = LD.offers.filter(o => o.id !== oid);
            lsave();
            navigateTo('offers'); }

        // ==================== ANALYTICS ====================
        function renderAnalytics(container) {
            const months = [t('jan'), t('feb'), t('mar'), t('apr'), t('may'), t('jun')];
            container.innerHTML = `
            <div class="grid-2">
              <div class="card animate-in"><div class="card-header"><h3>📊 ${t('salesChart')}</h3></div><div class="card-body"><canvas id="sc" height="250"></canvas></div></div>
              <div class="card animate-in"><div class="card-header"><h3>🏆 ${t('topMarketers')}</h3></div><div class="card-body"><canvas id="mc" height="250"></canvas></div></div>
            </div>`;
            setTimeout(() => { const c1 = document.getElementById('sc'); if (c1) new Chart(c1, { type: 'bar',
                    data: { labels: months, datasets: [{ label: t('sales'), data: [1200, 1900, 3000, 2500, 4200,
                                3800
                            ], backgroundColor: 'rgba(99,102,241,0.5)' }] },
                    options: { responsive: true, plugins: { legend: { display: false } } } }); const c2 = document
                    .getElementById('mc'); if (c2) new Chart(c2, { type: 'doughnut',
                    data: { labels: ['Mohamed', 'Sara', 'Ahmed'], datasets: [{ data: [35, 18, 12],
                            backgroundColor: ['#6366f1', '#10b981', '#f59e0b'] }] },
                    options: { responsive: true, plugins: { legend: { position: 'bottom' } } } }); }, 400);
        }

        // ==================== AUDIT LOG ====================
        function renderAuditLog(container) {
            container.innerHTML = `<div class="card animate-in"><div class="card-header"><h3>📜 ${t('auditLog')}</h3></div><div class="card-body"><div class="table-wrap"><table><tr><th>${t('date')}</th><th>${t('user')}</th><th>${t('action')}</th><th>${t('details')}</th></tr>${LD.auditLog.slice(0,80).map(l=>`<tr><td>${new Date(l.timestamp).toLocaleString()}</td><td>${findUser(l.userId)?.name||l.userId}</td><td>${l.action}</td><td>${l.details}</td></tr>`).join('')}</table></div></div></div>`;
        }

        // ==================== SETTINGS ====================
        function renderSettings(container) {
            container.innerHTML = `<div class="card animate-in"><div class="card-header"><h3>⚙️ ${t('settings')}</h3></div><div class="card-body"><div class="form-group"><label class="form-label">💵 ${t('minWithdraw')} (₺)</label><input class="form-input" type="number" id="smw" value="${LD.settings.minWithdrawal}"></div><div class="form-group"><label class="form-label">🎯 ${t('referralThreshold')}</label><input class="form-input" type="number" id="srt" value="${LD.settings.referralThreshold}"></div><div class="form-group"><label class="form-label">🏆 ${t('referralBonus')} (₺)</label><input class="form-input" type="number" id="srb" value="${LD.settings.referralBonus}"></div><div class="form-group"><label class="form-label">% ${t('defaultComm')}</label><input class="form-input" type="number" id="sdc" value="${LD.settings.defaultCommissionRate}"></div><button class="btn btn-accent" onclick="saveSet()">${t('save')}</button></div></div>`;
        }

        function saveSet() { LD.settings.minWithdrawal = parseFloat(document.getElementById('smw').value) || 200;
            LD.settings.referralThreshold = parseInt(document.getElementById('srt').value) || 50;
            LD.settings.referralBonus = parseFloat(document.getElementById('srb').value) || 300;
            LD.settings.defaultCommissionRate = parseFloat(document.getElementById('sdc').value) || 15;
            lsave();
            showToast('✅ ' + t('savedSuccess'), 'success'); }

        // ==================== NOTIFICATIONS ====================
        function toggleNotifications() { const dd = document.getElementById('notifDropdown');
            dd.classList.toggle('show'); if (dd.classList.contains('show')) { const ns = LD.notifications.filter(n => n
                    .userId === currentUser?.id).slice(0, 20);
                dd.innerHTML = ns.length === 0 ? '<div class="notif-item">' + t('noNotifications') + '</div>' : ns.map(n =>
                    `<div class="notif-item ${n.read?'':'unread'}" onclick="markRead('${n.id}')"><p>${n.message}</p><small>${new Date(n.timestamp).toLocaleString()}</small></div>`
                    ).join('');
                ns.forEach(n => { n.read = true; });
                lsave();
                updateNotifBadge(); } }

        function updateNotifBadge() { const b = document.getElementById('notifBadge'); if (!currentUser) { b.classList.add(
                    'hidden'); return; } const u = LD.notifications.filter(n => n.userId === currentUser.id && !n.read)
                .length; if (u > 0) { b.classList.remove('hidden');
                b.textContent = u > 99 ? '99+' : u; } else b.classList.add('hidden'); }

        function markRead(nid) { const n = LD.notifications.find(x => x.id === nid); if (n) n.read = true;
            lsave();
            updateNotifBadge(); }
        document.addEventListener('click', function(e) { const b = document.getElementById('notifBell'),
                d = document.getElementById('notifDropdown'); if (d && b && !b.contains(e.target) && !d.contains(e
                    .target)) d.classList.remove('show'); });

        // ==================== INIT ====================
        (async function() {
            await lload();
            currentLang = LD.settings.lang || 'ar';
            isDarkMode = LD.settings.theme === 'dark';
            currentAccent = LD.settings.accent || 'indigo';
            applyTheme();
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.getElementById('darkModeBtn').innerHTML = isDarkMode ? '<i class="fas fa-sun"></i>' :
                '<i class="fas fa-moon"></i>';
            document.getElementById('langBtn').textContent = currentLang === 'ar' ? 'EN' : 'AR';
            document.getElementById('sidebarSubtitle').textContent = t('platform');
            document.getElementById('fbLabel').textContent = t('fbGroup');
            document.getElementById('waLabel').textContent = t('whatsappSupport');
            showLogin();
            console.log('🚀 Kiro Print Ready (Fully Bilingual + Enhanced Details)');
            console.log('👑 Admin: adminzoz@kiro.print / 123456');
            console.log('📢 New: Marketer page name, full customer details, withdrawal info visible');
        })();
    </script>
</body>
</html>
