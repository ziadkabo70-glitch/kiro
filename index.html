        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value.trim();
            if (!email || !pass) return showToast(t('fillAll'), 'error');
            if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
                let admin = LD.users.find(u => u.email.toLowerCase() === ADMIN_EMAIL && u.role === 'admin');
                if (!admin) {
                    admin = { id: 'admin_001', name: 'Admin Zoz', phone: '01000000001', email: ADMIN_EMAIL, password: ADMIN_PASS, role: 'admin', balance: 0, salesCount: 0, commissionRate: 15, referralCode: 'ADMIN001', referredBy: null, permissions: ['all'], pageName: 'Main Admin', instagram: '', createdAt: new Date().toISOString(), active: true, banned: false, banReason: '' };
                    LD.users.push(admin);
                    lsave();
                }
                currentUser = admin;
            } else {
                const user = LD.users.find(u => (u.email.toLowerCase() === email || u.phone === email) && u.password === pass);
                if (!user) return showToast(t('invalidLogin'), 'error');
                if (!user.active || user.banned) return showToast(user.banned ? '🚫 ' + (user.banReason || t('banned')) : t('accountDisabled'), 'error');
                currentUser = user;
            }
            saveSession(currentUser.id);
            document.getElementById('sidebar').style.display = 'flex';
            LD.auditLog.unshift({ id: lgid(), userId: currentUser.id, action: 'Login', details: currentUser.name + ' logged in', timestamp: new Date().toISOString() });
            lsave();
            renderApp();
            showToast('👋 ' + t('welcome') + ', ' + currentUser.name + '!', 'success');
        }

        function handleRegister() {
            const agree = document.getElementById('agreeTerms');
            if (!agree || !agree.checked) {
                showToast('⚠️ ' + t('mustAgreeTerms'), 'error');
                return;
            }
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value.trim();
            const pageName = document.getElementById('regPageName').value.trim();
            const instagram = document.getElementById('regInstagram').value.trim();
            const ref = document.getElementById('regRef').value.trim();
            if (!name || !phone || !email || !pass) return showToast(t('fillAll'), 'error');
            if (email === ADMIN_EMAIL) return showToast(t('accountExists'), 'error');
            if (LD.users.find(u => u.email.toLowerCase() === email || u.phone === phone)) return showToast(t('accountExists'), 'error');
            let referredBy = null;
            if (ref) { const ru = LD.users.find(u => u.referralCode === ref && u.role === 'marketer'); if (ru) referredBy = ru.id; }
            const newUser = {
                id: lgid(), name, phone, email, password: pass, role: 'marketer', balance: 0, salesCount: 0,
                commissionRate: LD.settings.defaultCommissionRate,
                referralCode: 'REF' + Date.now().toString(36).toUpperCase(), referredBy,
                pageName: pageName || name, instagram,
                createdAt: new Date().toISOString(), active: true, banned: false, banReason: ''
            };
            LD.users.push(newUser);
            LD.auditLog.unshift({ id: lgid(), userId: newUser.id, action: 'Register', details: name + ' created account', timestamp: new Date().toISOString() });
            if (referredBy) { LD.notifications.unshift({ id: lgid(), userId: referredBy, message: '🎉 New marketer joined via your referral: ' + name, type: 'referral', read: false, timestamp: new Date().toISOString() }); }
            lsave();
            currentUser = newUser;
            saveSession(currentUser.id);
            document.getElementById('sidebar').style.display = 'flex';
            renderApp();
            showToast('✅ ' + t('accountCreated') + ' ' + t('welcome') + ', ' + name + '!', 'success');
        }

        function handleLogout() {
            if (currentUser) { LD.auditLog.unshift({ id: lgid(), userId: currentUser.id, action: 'Logout', details: currentUser.name + ' logged out', timestamp: new Date().toISOString() }); lsave(); }
            currentUser = null;
            clearSession();
            closeSidebar();
            showLogin();
        }
