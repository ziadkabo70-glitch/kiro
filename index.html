    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-ar: 'Cairo', 'Segoe UI', 'Tajawal', Tahoma, sans-serif;
            --font-en: 'Inter', 'Segoe UI', Tahoma, sans-serif;
            --radius-xs: 6px;

            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);

            --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

            --shadow: 0 4px 12px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08), 0 4px 14px rgba(0, 0, 0, 0.05);

        }
        [data-theme="light"] {
            --bg-primary: #f1f5f9; --bg-secondary: #f8fafc; --bg-surface: #ffffff; --bg-surface-hover: #f1f5f9;
            --bg-surface-alt: #f8fafc; --bg-elevated: #ffffff; --text-primary: #0f172a; --text-secondary: #475569;
            --text-tertiary: #94a3b8; --border-light: #e2e8f0; --border: #e2e8f0; --border-strong: #cbd5e1;
            --bg-input: #ffffff; --sidebar-bg: #ffffff; --danger-bg: #fef2f2; --danger-text: #dc2626;
            --success-bg: #f0fdf4; --success-text: #16a34a; --warning-bg: #fffbeb; --warning-text: #d97706;

        [data-theme="dark"] {
            --bg-primary: #0b1120; --bg-secondary: #111827; --bg-surface: #1a2235; --bg-surface-hover: #1f2937;
            --bg-surface-alt: #151d2e; --bg-elevated: #1e293b; --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --text-tertiary: #64748b; --border-light: #1e293b; --border: #263348; --border-strong: #334155;
            --bg-input: #1a2235; --sidebar-bg: #111827;

        [data-accent="indigo"] { --accent: #6366f1; --accent-light: #eef2ff; --accent-dark: #4f46e5; --accent-glow: rgba(99,102,241,0.35); }
        [data-accent="emerald"] { --accent: #10b981; --accent-light: #ecfdf5; --accent-dark: #059669; --accent-glow: rgba(16,185,129,0.35); }
        [data-accent="rose"] { --accent: #f43f5e; --accent-light: #fff1f2; --accent-dark: #e11d48; --accent-glow: rgba(244,63,94,0.35); }
        [data-accent="amber"] { --accent: #f59e0b; --accent-light: #fffbeb; --accent-dark: #d97706; --accent-glow: rgba(245,158,11,0.35); }
        [data-accent="violet"] { --accent: #8b5cf6; --accent-light: #f5f3ff; --accent-dark: #7c3aed; --accent-glow: rgba(139,92,246,0.35); }
        [data-accent="sky"] { --accent: #0ea5e9; --accent-light: #f0f9ff; --accent-dark: #0284c7; --accent-glow: rgba(14,165,233,0.35); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 15px; }

        ::selection { background: var(--accent); color: #fff; }

        @keyframes slideInLeft  { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-in { animation: fadeInUp 0.5s var(--bounce) both; }
        .animate-in-delay-1 { animation-delay: 0.05s; } .animate-in-delay-2 { animation-delay: 0.1s; } .animate-in-delay-3 { animation-delay: 0.15s; } .animate-in-delay-4 { animation-delay: 0.2s; }

        .sidebar-logo:hover { transform: scale(1.05); }
        .sidebar-logo .logo-accent { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .sidebar-logo .logo-text { color: var(--text-primary); }

        [dir="ltr"] .nav-link:hover { transform: translateX(4px); }

        .nav-link i { width: 22px; text-align: center; font-size: 1rem; flex-shrink: 0; position: relative; z-index: 1; }
        .sidebar-footer { padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
        .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); background: var(--bg-surface-alt); transition: all var(--transition-fast); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.9rem; flex-shrink: 0; box-shadow: 0 2px 8px var(--accent-glow); animation: float 3s ease-in-out infinite; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-weight: 700; font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .user-role { font-size: 0.68rem; color: var(--text-tertiary); }
        .main-content { flex: 1; margin-right: 270px; display: flex; flex-direction: column; min-height: 100vh; transition: margin var(--transition); }
        [dir="ltr"] .main-content { margin-right: 0; margin-left: 270px; }
        .topbar { background: var(--bg-elevated); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-shrink: 0; position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-xs); backdrop-filter: blur(10px); }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar-right { display: flex; align-items: center; gap: 8px; }
        .page-title { font-size: 1.2rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px; animation: fadeInUp 0.4s var(--bounce); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-primary); cursor: pointer; font-family: inherit; font-size: 0.82rem; font-weight: 600; transition: all var(--transition-fast); white-space: nowrap; text-decoration: none; letter-spacing: 0.2px; position: relative; overflow: hidden; }
        .btn:active { transform: scale(0.96); }
        .btn:hover { background: var(--bg-surface-hover); border-color: var(--border-strong); transform: translateY(-2px); box-shadow: var(--shadow); }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px var(--accent-glow); }
        .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); box-shadow: 0 6px 20px var(--accent-glow); }
        .btn-accent { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; border: none; box-shadow: 0 4px 16px var(--accent-glow); font-weight: 700; animation: pulse 3s infinite; }
        .btn-accent:hover { box-shadow: 0 8px 28px var(--accent-glow); transform: translateY(-3px); animation: none; }
        .btn-danger { background: var(--danger-bg); color: var(--danger-text); border-color: #fecaca; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; border-radius: var(--radius-xs); gap: 4px; }
        .btn-xs { padding: 4px 8px; font-size: 0.7rem; border-radius: var(--radius-xs); gap: 3px; }
        .btn-icon { width: 38px; height: 38px; padding: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary); cursor: pointer; font-size: 1rem; transition: all var(--transition-fast); position: relative; flex-shrink: 0; }
        .btn-icon:hover { background: var(--bg-surface-hover); color: var(--text-primary); border-color: var(--border-strong); transform: rotate(15deg); }
        .badge-count { position: absolute; top: -4px; right: -4px; min-width: 18px; height: 18px; border-radius: 10px; background: #ef4444; color: #fff; font-size: 0.6rem; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 5px; pointer-events: none; box-shadow: 0 2px 4px rgba(239,68,68,0.3); animation: fadeInScale 0.3s var(--bounce); }
        [dir="ltr"] .badge-count { right: auto; left: -4px; }
        .hidden { display: none !important; }
        .content-area { flex: 1; padding: 24px; overflow-y: auto; }
        .card { background: var(--bg-surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); transition: all var(--transition); overflow: hidden; animation: fadeInUp 0.5s var(--bounce) both; }
        .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; background: var(--bg-surface-alt); }
        .card-header h3 { font-size: 1rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
        .card-body { padding: 20px; }
        .card-footer { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--bg-surface-alt); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
        .stat-card { background: var(--bg-surface); border-radius: var(--radius); padding: 18px 20px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 14px; transition: all var(--transition); position: relative; overflow: hidden; animation: fadeInUp 0.5s var(--bounce) both; cursor: default; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .stat-icon-wrap { width: 50px; height: 50px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; transition: transform var(--transition); }
        .stat-card:hover .stat-icon-wrap { transform: scale(1.15) rotate(-5deg); }
        [dir="ltr"] .stat-card:hover .stat-icon-wrap { transform: scale(1.15) rotate(5deg); }
        .stat-icon-wrap.blue { background: #eef2ff; color: #6366f1; } .stat-icon-wrap.green { background: #ecfdf5; color: #10b981; }
        .stat-icon-wrap.amber { background: #fffbeb; color: #f59e0b; } .stat-icon-wrap.rose { background: #fff1f2; color: #f43f5e; }
        [data-theme="dark"] .stat-icon-wrap.blue { background: #1e1b4b; color: #818cf8; } [data-theme="dark"] .stat-icon-wrap.green { background: #0a2e1a; color: #6ee7b7; }
        [data-theme="dark"] .stat-icon-wrap.amber { background: #3a2a0a; color: #fcd34d; } [data-theme="dark"] .stat-icon-wrap.rose { background: #3b1219; color: #fca5a5; }
        .stat-info .stat-value { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; line-height: 1.2; }
        .stat-info .stat-label { font-size: 0.75rem; color: var(--text-tertiary); font-weight: 500; }
        .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        table th, table td { padding: 11px 14px; text-align: right; border-bottom: 1px solid var(--border-light); }
        [dir="ltr"] table th, [dir="ltr"] table td { text-align: left; }
        table th { background: var(--bg-surface-alt); font-weight: 700; color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; position: sticky; top: 0; }
        table tbody tr { transition: background var(--transition-fast); } table tbody tr:hover { background: var(--bg-surface-hover); }
        .status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; white-space: nowrap; }
        .status-pill.pending { background: #fef3c7; color: #92400e; } .status-pill.shipped { background: #dbeafe; color: #1e40af; }
        .status-pill.received { background: #d1fae5; color: #065f46; } .status-pill.rejected { background: #fee2e2; color: #991b1b; }
        .status-pill.returned { background: #fce7f3; color: #9d174d; } .status-pill.cancelled { background: #e5e7eb; color: #374151; }
        [data-theme="dark"] .status-pill.pending { background: #3d2e00; color: #fcd34d; } [data-theme="dark"] .status-pill.shipped { background: #1e3050; color: #93c5fd; }
        [data-theme="dark"] .status-pill.received { background: #1a3a2a; color: #6ee7b7; }
        .form-group { margin-bottom: 14px; } .form-label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 0.8rem; color: var(--text-secondary); letter-spacing: 0.3px; }
        .form-input, .form-select, textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-input); color: var(--text-primary); font-family: inherit; font-size: 0.88rem; transition: all var(--transition-fast); outline: none; }
        .form-input:focus, .form-select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); transform: translateY(-1px); }
        textarea { resize: vertical; min-height: 70px; }
        .form-select { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 10px center; background-size: 16px; padding-right: 36px; }
        [dir="ltr"] .form-select { background-position: left 10px center; padding-right: 14px; padding-left: 36px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; backdrop-filter: blur(4px); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { background: var(--bg-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-xl); width: 92%; max-width: 600px; max-height: 85vh; overflow-y: auto; animation: modalIn 0.35s var(--bounce); border: 1px solid var(--border); }
        @keyframes modalIn { from { transform: translateY(50px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg-surface); z-index: 1; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
        .modal-header h3 { font-weight: 800; font-size: 1.05rem; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; position: sticky; bottom: 0; background: var(--bg-surface); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
        .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { padding: 12px 18px; border-radius: var(--radius-sm); background: var(--bg-elevated); color: var(--text-primary); box-shadow: var(--shadow-xl); font-size: 0.82rem; font-weight: 600; pointer-events: auto; animation: toastIn 0.4s var(--bounce), toastOut 0.3s ease 3.5s forwards; display: flex; align-items: center; gap: 8px; max-width: 420px; border: 1px solid var(--border); }
        .toast.success { border-right: 4px solid #10b981; } [dir="ltr"] .toast.success { border-right: none; border-left: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; } [dir="ltr"] .toast.error { border-right: none; border-left: 4px solid #ef4444; }
        .toast.info { border-right: 4px solid #3b82f6; } [dir="ltr"] .toast.info { border-right: none; border-left: 4px solid #3b82f6; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-40px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-20px); } }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; }
        .notif-dropdown { position: absolute; top: calc(100% + 8px); left: 0; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-xl); width: 340px; max-height: 400px; overflow-y: auto; z-index: 150; display: none; animation: fadeInScale 0.25s var(--bounce); }

        .notif-item:hover { background: var(--bg-surface-hover); } .notif-item.unread { background: var(--accent-light); font-weight: 700; }
        .img-thumb { width: 55px; height: 55px; border-radius: var(--radius-xs); object-fit: cover; border: 1px solid var(--border); transition: transform var(--transition); }

        .empty-state i { font-size: 3rem; margin-bottom: 10px; opacity: 0.4; animation: float 3s ease-in-out infinite; }

        function handleLogin(){
            const email=document.getElementById('loginEmail').value.trim().toLowerCase();
            const pass=document.getElementById('loginPass').value.trim();
            if(!email||!pass) return showToast(t('fillAll'),'error');
            // استخدام بيانات الأدمن من إعدادات LD
            if(email===LD.settings.adminEmail && pass===LD.settings.adminPass){
                let admin=LD.users.find(u=>u.email===LD.settings.adminEmail && u.role==='admin');
                if(!admin){ admin={ id:'admin_001', name:'Admin', phone:'01000000001', email:LD.settings.adminEmail, password:LD.settings.adminPass, role:'admin', balance:0, salesCount:0, commissionRate:15, referralCode:'ADMIN001', referredBy:null, permissions:['all'], pageName:'Main Admin', instagram:'', createdAt:new Date().toISOString(), active:true, banned:false, banReason:'' }; LD.users.push(admin); lsave(); }
                currentUser=admin;
            } else {
                const user=LD.users.find(u=>(u.email===email||u.phone===email) && u.password===pass);
                if(!user) return showToast(t('invalidLogin'),'error');
                if(!user.active||user.banned) return showToast(user.banned?'🚫 '+(user.banReason||t('banned')):t('accountDisabled'),'error');
                currentUser=user;
            }
            saveSession(currentUser.id);
            document.getElementById('sidebar').style.display='flex';
            LD.auditLog.unshift({ id:lgid(), userId:currentUser.id, action:'Login', details:currentUser.name+' logged in', timestamp:new Date().toISOString() });
            lsave(); renderApp(); showToast('👋 '+t('welcome')+', '+currentUser.name+'!','success');
        }

        function handleRegister(){
            const name=document.getElementById('regName').value.trim(), phone=document.getElementById('regPhone').value.trim(),
                  email=document.getElementById('regEmail').value.trim().toLowerCase(), pass=document.getElementById('regPass').value.trim(),
                  pageName=document.getElementById('regPageName').value.trim(), instagram=document.getElementById('regInstagram').value.trim(),
                  ref=document.getElementById('regRef').value.trim();
            if(!name||!phone||!email||!pass) return showToast(t('fillAll'),'error');
            if(email===LD.settings.adminEmail) return showToast(t('accountExists'),'error');
            if(LD.users.find(u=>u.email===email||u.phone===phone)) return showToast(t('accountExists'),'error');
            let referredBy=null;
            if(ref){ const ru=LD.users.find(u=>u.referralCode===ref&&u.role==='marketer'); if(ru) referredBy=ru.id; }
            const newUser={ id:lgid(), name, phone, email, password:pass, role:'marketer', balance:0, salesCount:0, commissionRate:LD.settings.defaultCommissionRate, referralCode:'REF'+Date.now().toString(36).toUpperCase(), referredBy, pageName:pageName||name, instagram, createdAt:new Date().toISOString(), active:true, banned:false, banReason:'' };
            LD.users.push(newUser);
            LD.auditLog.unshift({ id:lgid(), userId:newUser.id, action:'Register', details:name+' created account', timestamp:new Date().toISOString() });
            if(referredBy){ LD.notifications.unshift({ id:lgid(), userId:referredBy, message:'🎉 New marketer joined via your referral: '+name, type:'referral', read:false, timestamp:new Date().toISOString() }); }
            lsave(); currentUser=newUser; saveSession(currentUser.id);
            document.getElementById('sidebar').style.display='flex'; renderApp(); showToast('✅ '+t('accountCreated'),'success');
        }

            if(currentUser){ LD.auditLog.unshift({ id:lgid(), userId:currentUser.id, action:'Logout', details:currentUser.name+' logged out', timestamp:new Date().toISOString() }); lsave(); }

        function renderCategories(container){ container.innerHTML=`<div class="card"><div class="card-header"><h3>🗂️ ${t('categories')}</h3><button class="btn btn-accent btn-sm" onclick="openCategoryModal()"><i class="fas fa-plus"></i> ${t('add')}</button></div><div class="card-body"><div class="table-wrap"><table><tr><th>${t('name')}</th><th>${t('products')}</th><th>${t('actions')}</th></tr>${LD.categories.map(c=>`<tr><td>${c.name}</td><td>${LD.products.filter(p=>p.categoryId===c.id).length}</td><td><button class="btn btn-xs" onclick="openCategoryModal('${c.id}')">✏️</button> <button class="btn btn-xs btn-danger" onclick="deleteCategory('${c.id}')">🗑️</button></td></tr>`).join('')}${LD.categories.length===0?`<tr><td colspan="3"><div class="empty-state">${t('noCategories')}</div></td></tr>`:''}</table></div></div></div>`; }

        function saveCategory(cid){ const name=document.getElementById('catName').value.trim(); if(!name) return showToast(t('fillAll'),'error'); if(cid){ const cat=LD.categories.find(c=>c.id===cid); if(cat) cat.name=name; } else LD.categories.push({ id:lgid(), name }); lsave(); closeModal(); navigateTo('categories'); showToast('✅ '+t('savedSuccess'),'success'); }
        function deleteCategory(cid){ if(confirm(t('delete')+'?')){ LD.categories=LD.categories.filter(c=>c.id!==cid); LD.products.forEach(p=>{ if(p.categoryId===cid) p.categoryId=null; }); lsave(); navigateTo('categories'); } }

        function renderProducts(container){
            const filterCat=document.getElementById('catFilter')?.value||'all'; let prods=LD.products; if(filterCat!=='all') prods=prods.filter(p=>p.categoryId===filterCat);
            const catOptions=LD.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');

        function openProductModal(pid=null){ const p=pid?findProduct(pid):null; const cats=LD.categories.map(c=>`<option value="${c.id}" ${p?.categoryId===c.id?'selected':''}>${c.name}</option>`).join(''); const cols=p?p.colors.map((c,i)=>`<div class="color-entry"><input class="form-input" placeholder="${t('colorName')}" value="${c.colorName}"><input class="form-input" placeholder="URL" value="${c.images[0]||''}"><input class="form-input" type="number" placeholder="${t('stock')}" value="${c.stock}" style="max-width:80px;"><button class="btn btn-xs btn-danger" onclick="this.parentElement.remove()">❌</button></div>`).join(''):`<div class="color-entry"><input class="form-input" placeholder="${t('colorName')}"><input class="form-input" placeholder="URL"><input class="form-input" type="number" placeholder="${t('stock')}" value="0" style="max-width:80px;"></div>`; document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>${p?t('editProduct'):t('addProduct')}</h3><button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="modal-body"><div class="form-group"><label class="form-label">${t('category')}</label><select class="form-select" id="pcat"><option value="">${t('selectCategory')}</option>${cats}</select></div><div class="form-group"><label class="form-label">${t('name')}</label><input class="form-input" id="pn" value="${p?.name||''}"></div><div class="form-group"><label class="form-label">${t('description')}</label><textarea id="pd">${p?.description||''}</textarea></div><div class="form-group"><label class="form-label">${t('price')} (₺)</label><input class="form-input" type="number" id="pp" value="${p?.basePrice||0}"></div><div class="form-group"><label class="form-label">${t('colors')}</label><div id="colorsContainer">${cols}</div><button class="btn btn-sm" onclick="addColorEntry()"><i class="fas fa-plus"></i> $         function deleteProduct(pid){ if(confirm(t('delete')+'?')){ LD.products=LD.products.filter(x=>x.id!==pid); lsave(); navigateTo('products'); } }
        function addToCart(pid){ const p=findProduct(pid); if(!p||!p.active) return showToast(t('unavailable'),'error'); const off=LD.offers.find(o=>o.productId===pid&&o.active), bp=off?Math.round(p.basePrice*(1-off.discountPercent/100)):p.basePrice; document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>🛒 ${t('placeOrder')}</h3><button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="modal-body"><p>${p.name} | ${t('basePrice')}: ${bp} ₺</p><div class="form-group"><label class="form-label">💰 ${t('sellingPrice')}</label><input class="form-input" type="number" id="sp" value="${bp}" min="${bp}" oninput="updateProfit(${bp})"><small>${t('sellingPrice')} > ${bp} ₺</small></div><div class="highlight-box">${t('yourProfit')}: <span id="profitVal">0</span> ₺</div><div class="form-group"><label class="form-label">🎨 ${t('color')}</label><select class="form-select" id="oc" onchange="updateOImgs('${pid}')">${p.colors.map(c=>`<option>${c.colorName} (${c.stock})</option>`).join('')}</select></div><div id="oimgs" style="display:flex;gap:8px;"></div><div class="form-group"><label class="form-label">${t('quantity')}</label><input class="form-input" type="number" id="oq" value="1" min="1" oninput="updateProfit(${bp})"></div><hr><h4>👤 ${t('customerInfo')}</h4><div class="form-group"><label class="form-label">${t('name')}</label><input class="form-input" id="cn"></div><div class="form-group"><label class="form-label">📱 ${t('phone1')}</label><input class="form-input" id="cp1"></div><div class="form-group"><label class="form-label">📱 ${t('phone2')}</label><input class="form-input" id="cp2"></div><div class="form-group"><label class="form-label">💬 ${t('whatsapp')}</label><input class="form-input" id="cw"></div></div><div class="modal-footer"><button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-accent" onclick="submitOrder('${pid}',${bp})">📩 ${t('submit')}</button></div></div></div>`; setTimeout(()=>updateOImgs(pid),100); }
        function updateProfit(bp){ const sp=parseFloat(document.getElementById('sp')?.value)||bp, q=parseInt(document.getElementById('oq')?.value)||0; document.getElementById('profitVal').textContent=Math.max(0,(sp-bp)*q).toLocaleString(); }
        function updateOImgs(pid){ const col=document.getElementById('oc')?.value?.split(' (')[0]; const p=findProduct(pid), el=document.getElementById('oimgs'); if(!el||!p||!col) return; const c=p.colors.find(x=>x.colorName===col); if(c) el.innerHTML=c.images.map(i=>`<img src="${i}" class="img-thumb" style="width:65px;height:65px;">`).join(''); }
        function submitOrder(pid,bp){
            const col=document.getElementById('oc')?.value?.split(' (')[0], qty=parseInt(document.getElementById('oq').value)||1, cn=document.getElementById('cn').value.trim(), cp1=document.getElementById('cp1').value.trim(), cp2=document.getElementById('cp2').value.trim(), cw=document.getElementById('cw').value.trim(), sp=parseFloat(document.getElementById('sp').value)||bp;
            if(!cn||!cp1) return showToast(t('customerInfoRequired'),'error');
            const total=sp*qty, comm=Math.max(0,(sp-bp)*qty);
            const ord={ id:lgid(), marketerId:currentUser.id, customer:{name:cn,phone1:cp1,phone2:cp2,whatsapp:cw}, items:[{productId:pid,color:col,quantity:qty,price:bp}], sellerPrice:sp, status:t('pending'), commissionAmount:comm, commissionStatus:'pending', totalAmount:total, frozenAt:null, createdAt:new Date().toISOString(), notes:'' };
            LD.orders.push(ord);
            const p=findProduct(pid); if(p){ const c=p.colors.find(x=>x.colorName===col); if(c) c.stock=Math.max(0,c.stock-qty); if(p.colors.reduce((s,x)=>s+x.stock,0)<=0) p.active=false; }
            LD.notifications.unshift({ id:lgid(), userId:currentUser.id, message:'📦 Order #'+ord.id.replace('id_','')+' placed - Commission: '+comm+' ₺', type:'order', read:false, timestamp:new Date().toISOString() });
            lsave(); closeModal(); navigateTo('myOrders'); showToast('✅ '+t('orderPlacedMsg'),'success'); updateNotifBadge();
            if(currentUser.referredBy) checkRefBonus();
        }
        function checkRefBonus(){
            const ref=findUser(currentUser.referredBy); if(!ref) return;
            const ms=LD.orders.filter(o=>o.marketerId===currentUser.id&&o.commissionStatus==='released').length;
            if(ms>=LD.settings.referralThreshold && !LD.transactions.some(t=>t.userId===ref.id&&t.type==='referral_bonus'&&t.description.includes(currentUser.id))){
                ref.balance+=LD.settings.referralBonus; LD.transactions.unshift({ id:lgid(), userId:ref.id, type:'referral_bonus', amount:LD.settings.referralBonus, description:'Referral bonus from '+currentUser.name, timestamp:new Date().toISOString() });
                LD.notifications.unshift({ id:lgid(), userId:ref.id, message:'🎉 Referral bonus '+LD.settings.referralBonus+' ₺ from '+currentUser.name, type:'bonus', read:false, timestamp:new Date().toISOString() }); lsave();
            }
        }

        // باقي الدوال: orders, marketers, withdrawals, referrals, storefront, offers, analytics, auditLog, settings
        // (موجودة بالكامل كما في النسخة الأصلية، تم تضمينها كلها هنا)
        function renderOrders(container){ processFrozenCommissions(); const search=document.getElementById('orderSearch')?.value||''; let ords=LD.orders.slice().reverse(); if(search) ords=ords.filter(o=>o.id.includes(search)); container.innerHTML=`<div class="card"><div class="card-header"><h3>📋 ${t('orders')}</h3><input class="form-input" id="orderSearch" placeholder="${t('searchOrderId')}" style="max-width:200px;" oninput="renderOrders(document.getElementById('contentArea'))"></div><div class="card-body"><div class="table-wrap"><table><tr><th>${t('orderId')}</th><th>${t('name')}</th><th>📱</th><th>${t('marketer')}</th><th>${t('amount')}</th><th>${t('marketerProfit')}</th><th>${t('status')}</th><th>${t('actions')}</th><th></th></tr>${ords.map(o=>{ const m=findUser(o.marketerId); const profit=o.commissionAmount||0; return `<tr><td>${o.id.replace('id_','')}</td><td><strong>${o.customer.name}</strong></td><td><small>${o.customer.phone1}<br>${o.customer.whatsapp||'—'}</small></td><td>${m?.name||'—'}<br><small>${m?.pageName||''}</small></td><td>${o.totalAmount} ₺</td><td>${profit} ₺</td><td><span class="status-pill ${getStatusClass(o.status)}">${o.status}</span><br><small>${o.commissionStatus}</small></td><td><select class="form-select" style="width:auto;padding:5px 8px;" onchange="updateOS('${o.id}',this.value)"><option value="">—</option><option value="${t('shipped')}">🚚 ${t('ship')}</option><option value="${t('received')}">✅ ${t('receive')}</option><option value="${t('rejected')}">❌ ${t('rejectOrder')}</option><option value="${t('returned')}">↩️ ${t('returnOrder')}</option><option value="${t('cancelled')}">🗑️ ${t('cancelOrder')}</option></select></td><td><button class="btn btn-xs" onclick="viewOrderDetails('${o.id}')">👁️</button></td></tr>`; }).join('')}${ords.length===0?`<tr><td colspan="9"><div class="empty-state">${t('noOrders')}</div></td></tr>`:''}</table></div></div></div>`; }
        function updateOS(oid,st){ if(!st) return; const o=LD.orders.find(x=>x.id===oid); if(!o) return; const m=findUser(o.marketerId); if(st===t('shipped')){ o.status=st; if(o.commissionStatus==='pending') o.commissionStatus='expected'; } else if(st===t('received')){ o.status=st; if(o.commissionStatus==='expected'&&o.commissionAmount>0){ o.commissionStatus='frozen'; o.frozenAt=new Date().toISOString(); } } else if(st===t('returned')){ o.status=st; if(o.commissionStatus==='released'&&confirm(t('deductCommissionQ'))){ m.balance=Math.max(0,m.balance-o.commissionAmount); o.commissionStatus='deducted'; } } else if(st===t('cancelled')){ o.status=st; if(o.commissionStatus==='pending'||o.commissionStatus==='expected') o.commissionStatus='cancelled'; } else o.status=st; lsave(); navigateTo('orders'); showToast('✅ '+t('updatedMsg'),'success'); updateNotifBadge(); }
        function renderMyOrders(container){ processFrozenCommissions(); const search=document.getElementById('myOrderSearch')?.value||''; let ords=LD.orders.filter(o=>o.marketerId===currentUser.id).reverse(); if(search) ords=ords.filter(o=>o.id.includes(search)); container.innerHTML=`<div class="card"><div class="card-header"><h3>📦 ${t('myOrders')}</h3><input class="form-input" id="myOrderSearch" placeholder="${t('searchOrderId')}" style="max-width:200px;" oninput="renderMyOrders(document.getElementById('contentArea'))"></div><div class="card-body"><div class="table-wrap"><table><tr><th>${t('orderId')}</th><th>${t('name')}</th><th>${t('amount')}</th><th>${t('commission')}</th><th>${t('status')}</th></tr>${ords.map(o=>`<tr><td>${o.id.replace('id_','')}</td><td>${o.customer.name} (${o.customer.phone1})</td><td>${o.totalAmount} ₺</td><td>${o.commissionAmount} ₺ (${o.commissionStatus})</td><td><span class="status-pill ${getStatusClass(o.status)}">${o.status}</span></td></tr>`).join('')}${ords.length===0?`<tr><td colspan="5"><div class="empty-state">${t('noOrders')}</div></td></tr>`:''}</table></div></div></div>`; }
        function renderMarketers(container){ const ms=LD.users.filter(u=>u.role==='marketer'); container.innerHTML=`<div class="card"><div class="card-header"><h3>👥 ${t('marketers')}</h3><button class="btn btn-accent btn-sm" onclick="openMarketerModal()"><i class="fas fa-plus"></i> ${t('add')}</button></div><div class="card-body"><div class="table-wrap"><table><tr><th>${t('name')}</th><th>🏪</th><th>📷</th><th>${t('phone')}</th><th>${t('balance')}</th><th>${t('sales')}</th><th>%</th><th>${t('actions')}</th></tr>${ms.map(m=>`<tr><td>${m.name} ${m.banned?'<span class="status-pill rejected">🚫 '+(m.banReason||t('banned'))+'</span>':''}</td><td>${m.pageName||'—'}</td><td>${m.instagram||'—'}</td><td>${m.phone}</td><td>${m.balance} ₺</td><td>${LD.orders.filter(o=>o.marketerId===m.id).length}</td><td>${m.commissionRate}%</td><td><button class="btn btn-xs btn-accent" onclick="openBonusModal('${m.id}')">💵</button><button class="btn btn-xs" onclick="openMarketerModal('${m.id}')">✏️</button><button class="btn btn-xs btn-danger" onclick="banMarketer('${m.id}')">${m.banned?t('unban'):t('ban')}</button></td></tr>`).join('')}</table></div></div></div>`; }
        function banMarketer(mid){ const m=findUser(mid); if(!m||m.role!=='marketer') return; if(m.banned){ m.banned=false; m.banReason=''; lsave(); navigateTo('marketers'); showToast('✅ '+t('unban')+' '+m.name,'success'); } else { const r=prompt(t('banReason')+':'); if(r!==null){ m.banned=true; m.banReason=r.trim(); lsave(); navigateTo('marketers'); showToast('🚫 '+t('ban')+' '+m.name,'info'); } } }
        function openMarketerModal(mid=null){ const m=mid?findUser(mid):null; document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>${m?t('editMarketer'):t('addMarketer')}</h3><button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="modal-body"><div class="form-group"><label class="form-label">${t('name')}</label><input class="form-input" id="mn" value="${m?.name||''}"></div><div class="form-group"><label class="form-label">🏪 ${t('pageName')}</label><input class="form-input" id="mpn" value="${m?.pageName||''}"></div><div class="form-group"><label class="form-label">📷 ${t('instagram')}</label><input class="form-input" id="minsta" value="${m?.instagram||''}"></div><div class="form-group"><label class="form-label">📱 ${t('phone')}</label><input class="form-input" id="mp" value="${m?.phone||''}"></div><div class="form-group"><label class="form-label">📧 ${t('email')}</label><input class="form-input" id="me" value="${m?.email||''}"></div><div class="form-group"><label class="form-label">🔑 ${t('password')}</label><input class="form-input" type="password" id="mps" value="${m?.password||''}"></div><div class="form-group"><label class="form-label">% ${t('commission')}</label><input class="form-input" type="number" id="mc" value="${m?.commissionRate||LD.settings.defaultCommissionRate}"></div></div><div class="modal-footer"><button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-accent" onclick="saveMarketer('${mid||''}')">${t('save')}</button></div></div></div>`; }
        function saveMarketer(mid){ const n=document.getElementById('mn').value.trim(), pn=document.getElementById('mpn').value.trim(), insta=document.getElementById('minsta').value.trim(), p=document.getElementById('mp').value.trim(), e=document.getElementById('me').value.trim(), ps=document.getElementById('mps').value.trim(), c=parseFloat(document.getElementById('mc').value)||LD.settings.defaultCommissionRate; if(!n||!p||!ps) return showToast(t('requiredFields'),'error'); if(mid){ const m=findUser(mid); if(m) Object.assign(m,{ name:n, pageName:pn, instagram:insta, phone:p, email:e, password:ps, commissionRate:c }); } else LD.users.push({ id:lgid(), name:n, phone:p, email:e, password:ps, role:'marketer', balance:0, salesCount:0, commissionRate:c, referralCode:'R'+Date.now().toString(36).toUpperCase(), referredBy:null, permissions:[], pageName:pn||n, instagram:insta, createdAt:new Date().toISOString(), active:true, banned:false, banReason:'' }); lsave(); closeModal(); navigateTo('marketers'); showToast('✅ '+t('savedSuccess'),'success'); }
        function openBonusModal(mid){ const m=findUser(mid); if(!m) return; document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>💵 ${t('adjustBalance')} - ${m.name}</h3><button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="modal-body"><p>${t('balance')}: ${m.balance} ₺</p><div class="form-group"><label class="form-label">${t('amount')}</label><input class="form-input" type="number" id="ba" value="0"></div><div class="form-group"><label class="form-label">${t('reason')}</label><input class="form-input" id="br"></div></div><div class="modal-footer"><button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-accent" onclick="applyBonus('${mid}')">${t('confirm')}</button></div></div></div>`; }
        function applyBonus(mid){ const a=parseFloat(document.getElementById('ba').value)||0, r=document.getElementById('br').value.trim(); if(a===0) return; const m=findUser(mid); if(!m) return; m.balance=Math.max(0,m.balance+a); LD.transactions.unshift({ id:lgid(), userId:m.id, type:a>0?'bonus':'deduction', amount:Math.abs(a), description:r||(a>0?'Bonus':'Deduction'), timestamp:new Date().toISOString() }); LD.notifications.unshift({ id:lgid(), userId:m.id, message:a>0?'💰 Added '+a+' ₺':'⚠️ Deducted '+Math.abs(a)+' ₺', type:'bonus', read:false, timestamp:new Date().toISOString() }); lsave(); closeModal(); navigateTo('marketers'); showToast('✅ '+t('doneMsg'),'success'); }
        function renderWithdrawals(container){ const wds=LD.withdrawals.slice().reverse(); container.innerHTML=`<div class="card"><div class="card-header"><h3>💳 ${t('withdrawals')}</h3></div><div class="card-body"><div class="table-wrap"><table><tr><th>#</th><th>${t('marketer')}</th><th>${t('method')}</th><th>${t('accountNumber')}</th><th>${t('amount')}</th><th>${t('status')}</th><th>${t('actions')}</th></tr>${wds.map(w=>`<tr><td>${w.id.replace('id_','')}</td><td>${findUser(w.marketerId)?.name||'—'}</td><td>${w.method}</td><td>${w.accountNumber}</td><td>${w.amount} ₺</td><td><span class="status-pill ${getStatusClass(w.status)}">${w.status}</span></td><td>${w.status==='قيد المراجعة'||w.status==='Under Review'?`<button class="btn btn-xs btn-success" onclick="appWD('${w.id}')">✅ ${t('approve')}</button><button class="btn btn-xs btn-danger" onclick="rejWD('${w.id}')">❌ ${t('reject')}</button>`:'—'}</td></tr>`).join('')}</table></div></div></div>`; }
        function openWithdrawModal(){ document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>💳 ${t('withdraw')}</h3><button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="modal-body"><p>${t('balance')}: <strong>${currentUser.balance} ₺</strong> | Min: ${LD.settings.minWithdrawal} ₺</p><div class="form-group"><label class="form-label">${t('method')}</label><select class="form-select" id="wm"><option>Vodafone Cash</option><option>InstaPay</option><option>Bank Transfer</option></select></div><div class="form-group"><label class="form-label">${t('accountNumber')}</label><input class="form-input" id="wa"></div><div class="form-group"><label class="form-label">${t('amount')}</label><input class="form-input" type="number" id="wamt" min="${LD.settings.minWithdrawal}" max="${currentUser.balance}"></div><p style="font-size:0.75rem;">${t('onlyThursday')}</p></div><div class="modal-footer"><button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-accent" onclick="subWD()">${t('confirm')}</button></div></div></div>`; }
        function subWD(){ const mt=document.getElementById('wm').value, ac=document.getElementById('wa').value.trim(), am=parseFloat(document.getElementById('wamt').value)||0; if(!ac) return showToast(t('accountRequired'),'error'); if(am<LD.settings.minWithdrawal) return showToast(t('belowMin'),'error'); if(am>currentUser.balance) return showToast(t('exceedsBalance'),'error'); currentUser.balance-=am; LD.withdrawals.push({ id:lgid(), marketerId:currentUser.id, method:mt, accountNumber:ac, amount:am, status:t('underReview'), createdAt:new Date().toISOString() }); lsave(); closeModal(); navigateTo('myWithdrawals'); showToast('✅ '+t('submittedMsg'),'success'); }
        function appWD(wid){ const w=LD.withdrawals.find(x=>x.id===wid); if(!w) return; w.status=t('transferred'); LD.notifications.unshift({ id:lgid(), userId:w.marketerId, message:'✅ Withdrawal '+w.amount+' ₺ approved', type:'withdrawal', read:false, timestamp:new Date().toISOString() }); lsave(); navigateTo('withdrawals'); showToast('✅ '+t('approvedMsg'),'success'); }
        function rejWD(wid){ const w=LD.withdrawals.find(x=>x.id===wid); if(!w) return; w.status=t('rejected'); const m=findUser(w.marketerId); if(m) m.balance+=w.amount; lsave(); navigateTo('withdrawals'); showToast(t('rejectedMsg'),'info'); }
        function renderMyWithdrawals(container){ const wds=LD.withdrawals.filter(w=>w.marketerId===currentUser.id).reverse(); container.innerHTML=`<button class="btn btn-accent animate-in" onclick="openWithdrawModal()"><i class="fas fa-wallet"></i> ${t('withdraw')}</button><p style="color:var(--text-tertiary);margin-bottom:14px;">⏳ ${t('onlyThursday')}</p><div class="card"><div class="card-header"><h3>💳 ${t('myWithdrawals')}</h3></div><div class="card-body"><div class="table-wrap"><table><tr><th>${t('method')}</th><th>${t('accountNumber')}</th><th>${t('amount')}</th><th>${t('status')}</th></tr>${wds.map(w=>`<tr><td>${w.method}</td><td>${w.accountNumber}</td><td>${w.amount} ₺</td><td><span class="status-pill ${getStatusClass(w.status)}">${w.status}</span></td></tr>`).join('')}</table></div></div></div>`; }
        function renderMyReferrals(container){ const rl=window.location.origin+'?ref='+currentUser.referralCode; const refs=LD.users.filter(u=>u.referredBy===currentUser.id); container.innerHTML=`<div class="card" style="margin-bottom:14px;"><div class="card-header"><h3>🔗 ${t('myReferrals')}</h3></div><div class="card-body"><div style="display:flex;gap:8px;"><input class="form-input" value="${rl}" readonly id="rli" style="direction:ltr;"><button class="btn btn-accent" onclick="copyRef()"><i class="fas fa-copy"></i> ${t('copy')}</button></div></div></div><div class="card"><div class="card-header"><h3>👥 ${t('referred')}</h3></div><div class="card-body"><div class="table-wrap"><table><tr><th>${t('name')}</th><th>${t('sales')}</th><th>${t('referralThreshold')}</th><th>${t('referralBonus')}</th></tr>${refs.map(u=>{ const s=LD.orders.filter(o=>o.marketerId===u.id&&o.commissionStatus==='released').length; const g=LD.settings.referralThreshold; return `<tr><td>${u.name}</td><td>${s}/${g}</td><td>${g}</td><td>${s>=g?`<span class="status-pill received">${LD.settings.referralBonus} ₺</span>`:'<span class="status-pill pending">⏳</span>'}</td></tr>`; }).join('')}</table></div></div></div>`; }

        function renderStorefront(container){ const ps=LD.products.filter(p=>p.active); container.innerHTML=`<div style="text-align:center;margin-bottom:20px;"><h2 style="color:var(--accent);">🏪 ${currentUser.pageName||currentUser.name}</h2>${currentUser.instagram?`<p><a href="https://instagram.com/${currentUser.instagram.replace('@','')}" target="_blank" style="color:var(--accent);"><i class="fab fa-instagram"></i> ${currentUser.instagram}</a></p>`:''}<button class="btn btn-accent btn-sm" onclick="copyRef()"><i class="fas fa-share"></i> ${t('share')}</button></div><div class="grid-3">${ps.map((p,i)=>{ const off=LD.offers.find(o=>o.productId===p.id&&o.active), pr=off?Math.round(p.basePrice*(1-off.discountPercent/100)):p.basePrice; return `<div class="card"><img src="${p.colors[0]?.images[0]||'https://picsum.photos/seed/sf/400/400'}" class="img-preview" style="height:170px;"><div class="card-body"><h4>${p.name}</h4><p style="font-weight:900;">${pr} ₺</p></div><div class="card-footer"><button class="btn btn-accent btn-sm" style="width:100%;" onclick="addToCart('${p.id}')">📲 ${t('orderNow')}</button></div></div>`; }).join('')}</div>`; }
        function renderOffers(container){ container.innerHTML=`<div class="card"><div class="card-header"><h3>🏷️ ${t('offers')}</h3><button class="btn btn-accent btn-sm" onclick="openOfferModal()"><i class="fas fa-plus"></i> ${t('add')}</button></div><div class="card-body"><div class="table-wrap"><table><tr><th>${t('product')}</th><th>%</th><th>${t('date')}</th><th>${t('publicOffer')}</th><th></th></tr>${LD.offers.map(o=>`<tr><td>${findProduct(o.productId)?.name||o.productId}</td><td>${o.discountPercent}%</td><td>${o.startDate} → ${o.endDate}</td><td>${o.public?t('publicOffer'):t('notPublic')}</td><td><button class="btn btn-xs btn-danger" onclick="deleteOffer('${o.id}')">🗑️</button></td></tr>`).join('')}</table></div></div></div>`; }
        function openOfferModal(){ document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>🏷️ ${t('addOffer')}</h3><button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="modal-body"><div class="form-group"><label class="form-label">${t('product')}</label><select class="form-select" id="op">${LD.products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">%</label><input class="form-input" type="number" id="opct" value="10"></div><div class="form-group"><label class="form-label">${t('startDate')}</label><input class="form-input" type="date" id="osd"></div><div class="form-group"><label class="form-label">${t('endDate')}</label><input class="form-input" type="date" id="oed"></div><div class="form-group"><label><input type="checkbox" id="opub" checked> ${t('publicOffer')}</label></div></div><div class="modal-footer"><button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-accent" onclick="saveOffer()">${t('save')}</button></div></div></div>`; document.getElementById('osd').value=new Date().toISOString().split('T')[0]; document.getElementById('oed').value=new Date(Date.now()+365*86400000).toISOString().split('T')[0]; }
        function saveOffer(){ LD.offers.push({ id:lgid(), productId:document.getElementById('op').value, discountPercent:parseFloat(document.getElementById('opct').value)||0, startDate:document.getElementById('osd').value, endDate:document.getElementById('oed').value, public:document.getElementById('opub').checked, active:true, createdAt:new Date().toISOString() }); lsave(); closeModal(); navigateTo('offers'); showToast('✅ '+t('savedSuccess'),'success'); }
        function deleteOffer(oid){ LD.offers=LD.offers.filter(o=>o.id!==oid); lsave(); navigateTo('offers'); }
        function renderAnalytics(container){ const months=[t('jan'),t('feb'),t('mar'),t('apr'),t('may'),t('jun')]; container.innerHTML=`<div class="grid-2"><div class="card"><div class="card-header"><h3>📊 ${t('salesChart')}</h3></div><div class="card-body"><canvas id="sc" height="250"></canvas></div></div><div class="card"><div class="card-header"><h3>🏆 ${t('topMarketers')}</h3></div><div class="card-body"><canvas id="mc" height="250"></canvas></div></div></div>`; setTimeout(()=>{ const c1=document.getElementById('sc'); if(c1) new Chart(c1,{ type:'bar', data:{ labels:months, datasets:[{ label:t('sales'), data:[1200,1900,3000,2500,4200,3800], backgroundColor:'rgba(99,102,241,0.5)' }] }, options:{ responsive:true, plugins:{ legend:{ display:false } } } }); const c2=document.getElementById('mc'); if(c2) new Chart(c2,{ type:'doughnut', data:{ labels:['Mohamed','Sara','Ahmed'], datasets:[{ data:[35,18,12], backgroundColor:['#6366f1','#10b981','#f59e0b'] }] }, options:{ responsive:true } }); },400); }
        function renderAuditLog(container){ container.innerHTML=`<div class="card"><div class="card-header"><h3>📜 ${t('auditLog')}</h3></div><div class="card-body"><div class="table-wrap"><table><tr><th>${t('date')}</th><th>${t('user')}</th><th>${t('action')}</th><th>${t('details')}</th></tr>${LD.auditLog.slice(0,80).map(l=>`<tr><td>${new Date(l.timestamp).toLocaleString()}</td><td>${findUser(l.userId)?.name||l.userId}</td><td>${l.action}</td><td>${l.details}</td></tr>`).join('')}</table></div></div></div>`; }
        function renderSettings(container){ container.innerHTML=`<div class="card"><div class="card-header"><h3>⚙️ ${t('settings')}</h3></div><div class="card-body"><div class="form-group"><label class="form-label">👑 ${t('email')} ${t('admin')}</label><input class="form-input" id="sae" value="${LD.settings.adminEmail}"></div><div class="form-group"><label class="form-label">🔑 ${t('password')} ${t('admin')}</label><input class="form-input" type="password" id="sap" value="${LD.settings.adminPass}"></div><div class="form-group"><label class="form-label">💵 ${t('minWithdraw')}</label><input class="form-input" type="number" id="smw" value="${LD.settings.minWithdrawal}"></div><div class="form-group"><label class="form-label">🎯 ${t('referralThreshold')}</label><input class="form-input" type="number" id="srt" value="${LD.settings.referralThreshold}"></div><div class="form-group"><label class="form-label">🏆 ${t('referralBonus')}</label><input class="form-input" type="number" id="srb" value="${LD.settings.referralBonus}"></div><div class="form-group"><label class="form-label">% ${t('defaultComm')}</label><input class="form-input" type="number" id="sdc" value="${LD.settings.defaultCommissionRate}"></div><button class="btn btn-accent" onclick="saveSet()">${t('save')}</button></div></div>`; }
        function saveSet(){
            LD.settings.adminEmail=document.getElementById('sae').value.trim()||LD.settings.adminEmail;
            LD.settings.adminPass=document.getElementById('sap').value.trim()||LD.settings.adminPass;
            LD.settings.minWithdrawal=parseFloat(document.getElementById('smw').value)||200;
            LD.settings.referralThreshold=parseInt(document.getElementById('srt').value)||50;
            LD.settings.referralBonus=parseFloat(document.getElementById('srb').value)||300;
            LD.settings.defaultCommissionRate=parseFloat(document.getElementById('sdc').value)||15;
            lsave(); showToast('✅ '+t('savedSuccess'),'success');
        }

        // Notifications
        function toggleNotifications(){ const dd=document.getElementById('notifDropdown'); dd.classList.toggle('show'); if(dd.classList.contains('show')){ const ns=LD.notifications.filter(n=>n.userId===currentUser?.id).slice(0,20); dd.innerHTML=ns.length?ns.map(n=>`<div class="notif-item ${n.read?'':'unread'}" onclick="markRead('${n.id}')"><p>${n.message}</p><small>${new Date(n.timestamp).toLocaleString()}</small></div>`).join(''):'<div class="notif-item">'+t('noNotifications')+'</div>'; ns.forEach(n=>n.read=true); lsave(); updateNotifBadge(); } }
        function updateNotifBadge(){ const b=document.getElementById('notifBadge'); if(!currentUser){ b.classList.add('hidden'); return; } const u=LD.notifications.filter(n=>n.userId===currentUser.id&&!n.read).length; if(u>0){ b.classList.remove('hidden'); b.textContent=u>99?'99+':u; } else b.classList.add('hidden'); }
        function markRead(nid){ const n=LD.notifications.find(x=>x.id===nid); if(n) n.read=true; lsave(); updateNotifBadge(); }
        document.addEventListener('click',function(e){ const b=document.getElementById('notifBell'), d=document.getElementById('notifDropdown'); if(d&&b&&!b.contains(e.target)&&!d.contains(e.target)) d.classList.remove('show'); });

        // Dashboard
        function renderDashboard(container){
            if(currentUser.role==='admin'){
                const tp=LD.products.length, tm=LD.users.filter(u=>u.role==='marketer').length, to=LD.orders.length, ts=LD.orders.reduce((s,o)=>s+(o.totalAmount||0),0), ec=LD.orders.filter(o=>o.commissionStatus==='expected').reduce((s,o)=>s+o.commissionAmount,0), fc=LD.orders.filter(o=>o.commissionStatus==='frozen').reduce((s,o)=>s+o.commissionAmount,0);
                container.innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="stat-icon-wrap blue"><i class="fas fa-box"></i></div><div class="stat-info"><div class="stat-value">${tp}</div><div class="stat-label">${t('products')}</div></div></div><div class="stat-card"><div class="stat-icon-wrap green"><i class="fas fa-users"></i></div><div class="stat-info"><div class="stat-value">${tm}</div><div class="stat-label">${t('marketers')}</div></div></div><div class="stat-card"><div class="stat-icon-wrap amber"><i class="fas fa-shopping-cart"></i></div><div class="stat-info"><div class="stat-value">${to}</div><div class="stat-label">${t('orders')}</div></div></div><div class="stat-card"><div class="stat-icon-wrap rose"><i class="fas fa-coins"></i></div><div class="stat-info"><div class="stat-value">${ts} ₺</div><div class="stat-label">${t('sales')}</div></div></div><div class="stat-card"><div class="stat-icon-wrap amber"><i class="fas fa-clock"></i></div><div class="stat-info"><div class="stat-value">${ec} ₺</div><div class="stat-label">${t('expectedCommission')}</div></div></div><div class="stat-card"><div class="stat-icon-wrap blue"><i class="fas fa-snowflake"></i></div><div class="stat-info"><div class="stat-value">${fc} ₺</div><div class="stat-label">${t('frozenCommission')}</div></div></div></div><div class="grid-2"><div class="card"><div class="card-header"><h3>📋 ${t('recentOrders')}</h3></div><div class="card-body" id="rtbl"></div></div><div class="card"><div class="card-header"><h3>💳 ${t('pendingWithdrawals')}</h3></div><div class="card-body" style="text-align:center;font-size:2.5rem;font-weight:900;color:var(--accent);">${LD.withdrawals.filter(w=>w.status==='قيد المراجعة'||w.status==='Under Review').length}</div></div></div>`;
                const el=document.getElementById('rtbl'); if(el){ const o=LD.orders.slice(-6).reverse(); el.innerHTML=o.length?`<div class="table-wrap"><table><tr><th>#</th><th>${t('name')}</th><th>${t('amount')}</th><th>${t('status')}</th><th></th></tr>${o.map(x=>`<tr><td>${x.id.replace('id_','')}</td><td>${x.customer.name}</td><td>${x.totalAmount} ₺</td><td><span class="status-pill ${getStatusClass(x.status)}">${x.status}</span></td><td><button class="btn btn-xs" onclick="viewOrderDetails('${x.id}')">👁️</button></td></tr>`).join('')}</table></div>`:'<div class="empty-state">📭 '+t('noData')+'</div>'; }
            } else {
                processFrozenCommissions();
                const mo=LD.orders.filter(o=>o.marketerId===currentUser.id), rel=mo.filter(o=>o.commissionStatus==='released').reduce((s,o)=>s+o.commissionAmount,0), rc=LD.users.filter(u=>u.referredBy===currentUser.id).length, ec=mo.filter(o=>o.commissionStatus==='expected').reduce((s,o)=>s+o.commissionAmount,0), fc=mo.filter(o=>o.commissionStatus==='frozen').reduce((s,o)=>s+o.commissionAmount,0);
                container.innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="stat-icon-wrap green"><i class="fas fa-wallet"></i></div><div class="stat-info"><div class="stat-value">${currentUser.balance} ₺</div><div class="stat-label">${t('balance')}</div></div></div><div class="stat-card"><div class="stat-icon-wrap amber"><i class="fas fa-coins"></i></div><div class="stat-info"><div class="stat-value">${rel} ₺</div><div class="stat-label">${t('earnings')}</div></div></div><div class="stat-card"><div class="stat-icon-wrap rose"><i class="fas fa-user-friends"></i></div><div class="stat-info"><div class="stat-value">${rc}</div><div class="stat-label">${t('myReferrals')}</div></div></div><div class="stat-card"><div class="stat-icon-wrap blue"><i class="fas fa-shopping-cart"></i></div><div class="stat-info"><div class="stat-value">${mo.length}</div><div class="stat-label">${t('myOrders')}</div></div></div><div class="stat-card"><div class="stat-icon-wrap amber"><i class="fas fa-clock"></i></div><div class="stat-info"><div class="stat-value">${ec} ₺</div><div class="stat-label">${t('expectedCommission')}</div></div></div><div class="stat-card"><div class="stat-icon-wrap blue"><i class="fas fa-snowflake"></i></div><div class="stat-info"><div class="stat-value">${fc} ₺</div><div class="stat-label">${t('frozenCommission')}</div></div></div></div><div class="card" style="margin-bottom:14px;"><div class="card-body" style="text-align:center;"><button class="btn btn-accent" onclick="openWithdrawModal()"><i class="fas fa-wallet"></i> ${t('withdraw')}</button><p style="color:var(--text-tertiary);margin-top:8px;">⏳ ${t('onlyThursday')}</p></div></div><div class="card"><div class="card-header"><h3>📦 ${t('myOrders')}</h3></div><div class="card-body" id="motbl"></div></div>`;
                const el2=document.getElementById('motbl'); if(el2){ const o=mo.slice(-5).reverse(); el2.innerHTML=o.length?`<div class="table-wrap"><table><tr><th>#</th><th>${t('name')}</th><th>${t('commission')}</th><th>${t('status')}</th></tr>${o.map(x=>`<tr><td>${x.id.replace('id_','')}</td><td>${x.customer.name}</td><td>${x.commissionAmount} ₺</td><td><span class="status-pill ${getStatusClass(x.status)}">${x.status}</span></td></tr>`).join('')}</table></div>`:'<div class="empty-state">📭 '+t('noData')+'</div>'; }
            }
        }
        function viewOrderDetails(oid){ const o=LD.orders.find(x=>x.id===oid); if(!o) return; const m=findUser(o.marketerId); document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>📋 ${t('orderDetails')} #${oid.replace('id_','')}</h3><button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="modal-body"><div class="order-detail-grid"><div><span>👤 ${t('name')}:</span> <strong>${o.customer.name}</strong></div><div><span>📱 ${t('phone1')}:</span> <strong>${o.customer.phone1}</strong></div><div><span>📱 ${t('phone2')}:</span> <strong>${o.customer.phone2||'—'}</strong></div><div><span>💬 ${t('whatsapp')}:</span> <strong>${o.customer.whatsapp||'—'}</strong></div><div><span>📦 ${t('product')}:</span> <strong>${findProduct(o.items[0]?.productId)?.name||'—'}</strong></div><div><span>🎨 ${t('color')}:</span> <strong>${o.items[0]?.color||'—'}</strong></div><div><span>🔢 ${t('quantity')}:</span> <strong>${o.items[0]?.quantity||0}</strong></div><div><span>💰 ${t('amount')}:</span> <strong>${o.totalAmount} ₺</strong></div><div><span>💵 ${t('sellingPrice')}:</span> <strong>${o.sellerPrice} ₺</strong></div><div><span>👤 ${t('marketer')}:</span> <strong>${m?.name||'—'} (${m?.pageName||'—'})</strong></div><div><span>📊 ${t('status')}:</span> <span class="status-pill ${getStatusClass(o.status)}">${o.status}</span></div><div><span>💎 ${t('commission')}:</span> <strong>${o.commissionAmount} ₺ (${o.commissionStatus})</strong></div></div></div><div class="modal-footer"><button class="btn btn-accent" onclick="closeModal()">${t('close')}</button></div></div></div>`; }

        // ==================== INIT ====================
        (async function(){
            await lload();
            currentLang=LD.settings.lang||'ar'; isDarkMode=LD.settings.theme==='dark'; currentAccent=LD.settings.accent||'indigo';
            applyTheme();
            document.documentElement.dir=currentLang==='ar'?'rtl':'ltr'; document.documentElement.lang=currentLang;
            document.getElementById('darkModeBtn').innerHTML=isDarkMode?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';
            document.getElementById('langBtn').textContent=currentLang==='ar'?'EN':'AR';
            document.getElementById('sidebarSubtitle').textContent=t('platform');
            document.getElementById('fbLabel').textContent=t('fbGroup');
            document.getElementById('waLabel').textContent=t('whatsappSupport');
            document.getElementById('igLabel').textContent=t('instagramSupport');
            const saved=getSessionUserId();
            if(saved){ const u=LD.users.find(u=>u.id===saved); if(u&&!u.banned&&u.active){ currentUser=u; document.getElementById('sidebar').style.display='flex'; updateSidebar(); updateSidebarUserInfo(); updateNotifBadge(); navigateTo('dashboard'); } else { clearSession(); showLogin(); } }
            else showLogin();
            console.log('🚀 Kiro Print Ready');
        })();
    </script>
</body>
</html>
